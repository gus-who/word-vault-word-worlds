<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#12100e">
<title>The Word Vault — Word Worlds</title>
<style>
:root{
  --iron-0:#0c0a09;
  --iron-1:#12100e;
  --iron-2:#1c1815;
  --iron-3:#2a2320;
  --iron-4:#3a302a;
  --ash:#8a7d72;
  --ash-light:#c7bbae;
  --parchment:#efe6d6;
  --ember:#ff6b35;
  --ember-2:#ff8c42;
  --gold:#ffb347;
  --gold-soft:#e8c37a;
  --good:#7bd88f;
  --warn:#ffcf6b;
  --bad:#e86a6a;
  --close:#f0a35e;
  /* restoration level 0..1 drives the forge coming back to life */
  --restore:0;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
  background:
    radial-gradient(120% 90% at 50% -10%, #241a14 0%, var(--iron-1) 45%, var(--iron-0) 100%);
  color:var(--parchment);
  min-height:100%;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
#app{max-width:560px;margin:0 auto;min-height:100vh;position:relative;padding:0 16px 40px;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
h1,h2,h3{font-weight:600;margin:0;letter-spacing:.02em;}

/* ---------- shared ---------- */
.screen{animation:rise .45s cubic-bezier(.2,.7,.2,1);}
@keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
.eyebrow{font-size:.72rem;letter-spacing:.32em;text-transform:uppercase;color:var(--ash);
  font-family:ui-sans-serif,system-ui,sans-serif;font-weight:600;}
.serif-title{font-size:2rem;line-height:1.05;color:var(--parchment);text-shadow:0 2px 20px rgba(255,107,53,.25);}
.body{font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;}
.muted{color:var(--ash);}
.center{text-align:center;}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:.5em;
  font-family:ui-sans-serif,system-ui,sans-serif;font-weight:650;font-size:1rem;
  padding:15px 22px;border-radius:14px;
  background:linear-gradient(180deg,var(--ember-2),var(--ember));
  color:#2a1206;box-shadow:0 8px 24px -8px rgba(255,107,53,.7),inset 0 1px 0 rgba(255,255,255,.35);
  transition:transform .12s ease, box-shadow .12s ease, filter .12s;
  width:100%;
}
.btn:active{transform:translateY(2px) scale(.99);filter:brightness(1.05);}
.btn.ghost{background:var(--iron-3);color:var(--parchment);box-shadow:inset 0 0 0 1px var(--iron-4);}
.btn.ghost:active{filter:brightness(1.2);}
.btn.small{width:auto;padding:11px 18px;font-size:.9rem;border-radius:11px;}

/* ---------- map ---------- */
.mapwrap{padding-top:52px;}
.forge-emblem{
  width:190px;height:190px;margin:0 auto 6px;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.anvil{
  font-size:100px;line-height:1;position:relative;z-index:2;
  filter:
    grayscale(calc(1 - var(--restore)))
    brightness(calc(.55 + var(--restore)*.7))
    drop-shadow(0 0 calc(var(--restore)*34px) rgba(255,120,50,calc(var(--restore)*.9)));
  transition:filter .8s ease;
}
.forge-glow{
  position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 50% 62%, rgba(255,120,40,.9), rgba(255,80,20,.25) 40%, transparent 68%);
  opacity:calc(var(--restore)*.9);filter:blur(6px);transition:opacity .8s ease;z-index:1;
}
.embers{position:absolute;inset:-20px;pointer-events:none;z-index:3;opacity:calc(.15 + var(--restore));}
.ember{position:absolute;bottom:34%;left:50%;width:5px;height:5px;border-radius:50%;
  background:var(--gold);box-shadow:0 0 8px var(--ember);opacity:0;
  animation:float 2.6s ease-in infinite;}
@keyframes float{
  0%{transform:translate(0,0) scale(.6);opacity:0;}
  15%{opacity:1;}
  100%{transform:translate(var(--dx,0),-120px) scale(0);opacity:0;}
}
.worldlist{margin-top:26px;display:flex;flex-direction:column;gap:12px;}
.world-card{
  display:flex;align-items:center;gap:14px;text-align:left;
  padding:16px;border-radius:16px;background:var(--iron-2);
  box-shadow:inset 0 0 0 1px var(--iron-3);width:100%;transition:transform .12s, box-shadow .2s;
}
.world-card.active{
  background:linear-gradient(180deg,var(--iron-3),var(--iron-2));
  box-shadow:inset 0 0 0 1px rgba(255,140,66,.5),0 10px 30px -14px rgba(255,107,53,.6);
}
.world-card.active:active{transform:scale(.985);}
.world-card.locked{opacity:.5;filter:saturate(.4);}
.wc-icon{font-size:30px;width:44px;text-align:center;flex:0 0 auto;}
.wc-body{flex:1;min-width:0;}
.wc-name{font-size:1.12rem;color:var(--parchment);}
.wc-sub{font-size:.78rem;color:var(--ash);font-family:ui-sans-serif,system-ui,sans-serif;margin-top:2px;}
.wc-tag{font-size:.66rem;letter-spacing:.15em;text-transform:uppercase;font-family:ui-sans-serif,system-ui,sans-serif;
  padding:5px 9px;border-radius:20px;font-weight:700;flex:0 0 auto;}
.tag-play{background:rgba(255,140,66,.16);color:var(--gold);}
.tag-lock{background:var(--iron-3);color:var(--ash);}
.tag-done{background:rgba(123,216,143,.15);color:var(--good);}

/* mini restore bar on world card */
.wc-bar{height:5px;border-radius:4px;background:var(--iron-3);margin-top:9px;overflow:hidden;}
.wc-bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--ember),var(--gold));width:0;transition:width .6s;}

/* ---------- run header ---------- */
.runhead{position:sticky;top:0;z-index:20;padding:14px 0 12px;
  background:linear-gradient(180deg,var(--iron-1) 60%,transparent);}
.runhead-top{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.back{font-family:ui-sans-serif,system-ui,sans-serif;font-size:.82rem;color:var(--ash);padding:6px 4px;}
.phase-name{font-family:ui-sans-serif,system-ui,sans-serif;font-size:.72rem;letter-spacing:.18em;
  text-transform:uppercase;color:var(--gold-soft);font-weight:700;}
.score-chip{font-family:ui-sans-serif,system-ui,sans-serif;font-weight:800;font-size:.95rem;color:var(--parchment);}
.score-chip small{color:var(--ash);font-weight:600;}
.restore-track{height:9px;border-radius:6px;background:var(--iron-3);margin-top:10px;overflow:hidden;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.5);position:relative;}
.restore-fill{height:100%;width:0;border-radius:6px;
  background:linear-gradient(90deg,#c9421a,var(--ember),var(--gold));
  box-shadow:0 0 14px rgba(255,140,60,.7);transition:width .7s cubic-bezier(.2,.7,.2,1);}
.restore-label{font-family:ui-sans-serif,system-ui,sans-serif;font-size:.66rem;color:var(--ash);
  margin-top:5px;letter-spacing:.06em;text-align:right;}

/* ---------- round content ---------- */
.round{padding-top:8px;}
.progress-dots{display:flex;gap:6px;justify-content:center;margin:2px 0 18px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--iron-3);transition:background .3s,transform .3s;}
.dot.done{background:var(--gold);}
.dot.cur{background:var(--ember);transform:scale(1.5);}

.situation-card{
  background:linear-gradient(180deg,#211a15,#171310);
  border-radius:18px;padding:22px 20px;position:relative;
  box-shadow:inset 0 0 0 1px var(--iron-3),0 16px 40px -20px rgba(0,0,0,.8);
}
.situation-card::before{content:'“';position:absolute;top:2px;left:12px;font-size:3.4rem;color:rgba(255,140,66,.22);}
.prompt-label{font-family:ui-sans-serif,system-ui,sans-serif;font-size:.7rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--ash);font-weight:700;margin-bottom:8px;}
.situation-text{font-size:1.24rem;line-height:1.45;color:var(--parchment);}
.ask{font-family:ui-sans-serif,system-ui,sans-serif;text-align:center;color:var(--gold-soft);
  font-size:.9rem;margin:18px 0 12px;font-weight:600;}

.cards{display:flex;flex-direction:column;gap:11px;}
.wordcard{
  display:flex;align-items:baseline;gap:12px;text-align:left;padding:16px 18px;border-radius:15px;
  background:linear-gradient(180deg,var(--iron-3),var(--iron-2));
  box-shadow:inset 0 0 0 1px var(--iron-4),0 6px 16px -10px #000;
  transition:transform .1s, box-shadow .15s, opacity .3s, background .3s;
  width:100%;
}
.wordcard:active{transform:scale(.985);}
.wordcard .w{font-size:1.28rem;color:var(--parchment);font-weight:600;letter-spacing:.01em;}
.wordcard .g{font-family:ui-sans-serif,system-ui,sans-serif;font-size:.8rem;color:var(--ash);flex:1;}
.wordcard.dim{opacity:.4;}
.wordcard.pick-exact{background:linear-gradient(180deg,#22482c,#1a3322);box-shadow:inset 0 0 0 1.5px var(--good),0 0 26px -6px rgba(123,216,143,.6);}
.wordcard.pick-close{background:linear-gradient(180deg,#4a3320,#33251a);box-shadow:inset 0 0 0 1.5px var(--close),0 0 26px -8px rgba(240,163,94,.5);}
.wordcard.pick-miss{background:linear-gradient(180deg,#4a2424,#331a1a);box-shadow:inset 0 0 0 1.5px var(--bad);}
.wordcard.reveal-exact{box-shadow:inset 0 0 0 1.5px rgba(123,216,143,.7);}
.wordcard .tick{margin-left:auto;font-weight:800;font-family:ui-sans-serif,system-ui,sans-serif;font-size:.82rem;}

/* feedback */
.feedback{margin-top:18px;animation:rise .3s;}
.verdict{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.badge{font-family:ui-sans-serif,system-ui,sans-serif;font-weight:800;font-size:.74rem;letter-spacing:.14em;
  text-transform:uppercase;padding:7px 12px;border-radius:20px;}
.badge.exact{background:rgba(123,216,143,.16);color:var(--good);}
.badge.close{background:rgba(240,163,94,.18);color:var(--close);}
.badge.miss{background:rgba(232,106,106,.16);color:var(--bad);}
.pts{margin-left:auto;font-family:ui-sans-serif,system-ui,sans-serif;font-weight:800;color:var(--gold);font-size:1.05rem;}
.explain{font-family:ui-sans-serif,system-ui,sans-serif;font-size:.96rem;line-height:1.5;color:var(--ash-light);
  background:var(--iron-2);border-radius:13px;padding:14px 15px;box-shadow:inset 0 0 0 1px var(--iron-3);}
.explain b{color:var(--parchment);}
.explain + .explain{margin-top:9px;}
.explain .lead{display:block;font-weight:700;color:var(--gold-soft);margin-bottom:3px;font-size:.78rem;
  letter-spacing:.08em;text-transform:uppercase;}

/* duel */
.timer-track{height:7px;border-radius:5px;background:var(--iron-3);overflow:hidden;margin:4px 0 20px;}
.timer-fill{height:100%;width:100%;background:linear-gradient(90deg,var(--ember),var(--gold));
  transition:width .1s linear;}
.timer-fill.low{background:var(--bad);}
.duel-vs{display:flex;align-items:center;justify-content:center;gap:14px;margin:2px 0 18px;}
.duel-name{font-size:1.15rem;color:var(--gold-soft);font-weight:600;}
.duel-vs span{font-family:ui-sans-serif,system-ui,sans-serif;color:var(--ash);font-size:.8rem;font-weight:700;}
.duel-cards{display:flex;gap:12px;}
.duel-cards .wordcard{flex:1;justify-content:center;text-align:center;flex-direction:column;align-items:center;}
.duel-cards .wordcard .w{font-size:1.35rem;}
.combo{font-family:ui-sans-serif,system-ui,sans-serif;text-align:center;font-size:.8rem;color:var(--gold);
  font-weight:700;height:18px;margin-bottom:6px;letter-spacing:.05em;}

/* results */
.result-hero{text-align:center;padding-top:40px;}
.result-anvil{font-size:96px;filter:drop-shadow(0 0 40px rgba(255,140,60,.8));animation:pulseGlow 2.4s ease-in-out infinite;}
@keyframes pulseGlow{0%,100%{filter:drop-shadow(0 0 24px rgba(255,140,60,.6));}50%{filter:drop-shadow(0 0 48px rgba(255,180,90,.95));}}
.big-score{font-size:3.4rem;font-weight:700;color:var(--gold);line-height:1;margin:14px 0 2px;
  text-shadow:0 0 30px rgba(255,140,60,.5);}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:22px 0;}
.stat{background:var(--iron-2);border-radius:13px;padding:14px;box-shadow:inset 0 0 0 1px var(--iron-3);text-align:left;}
.stat .k{font-family:ui-sans-serif,system-ui,sans-serif;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ash);}
.stat .v{font-size:1.5rem;color:var(--parchment);font-weight:600;margin-top:3px;}
.stat .v small{font-size:.8rem;color:var(--ash);}
.rank-line{font-family:ui-sans-serif,system-ui,sans-serif;color:var(--ash-light);text-align:center;
  font-size:1rem;line-height:1.5;margin:6px 0 22px;}
.rank-line b{color:var(--gold-soft);}

.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(30px);
  background:var(--iron-3);color:var(--gold);font-family:ui-sans-serif,system-ui,sans-serif;font-weight:700;
  padding:12px 20px;border-radius:30px;box-shadow:0 12px 30px -10px #000,inset 0 0 0 1px var(--iron-4);
  opacity:0;transition:.35s cubic-bezier(.2,.7,.2,1);z-index:50;font-size:.9rem;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.footer-note{font-family:ui-sans-serif,system-ui,sans-serif;font-size:.72rem;color:var(--iron-4);
  text-align:center;margin-top:30px;}
.spacer{height:14px;}
.foot-actions{display:flex;flex-direction:column;gap:10px;margin-top:8px;}
.strike-flash{position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle,rgba(255,180,80,.35),transparent 60%);
  opacity:0;z-index:40;}
.strike-flash.go{animation:flash .5s ease-out;}
@keyframes flash{0%{opacity:1;}100%{opacity:0;}}

/* ---------- game master (maker's mark) ---------- */
.gm-banner{display:flex;align-items:center;gap:13px;padding:14px;border-radius:15px;
  background:linear-gradient(180deg,#211a15,#171310);box-shadow:inset 0 0 0 1px var(--iron-3);}
.gm-mark{flex:0 0 auto;width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 60%,rgba(255,120,40,.18),transparent 70%);
  box-shadow:inset 0 0 0 1px var(--iron-4);}
.gm-mark .emblem{filter:drop-shadow(0 0 6px rgba(255,140,66,.4));}
.gm-text{flex:1;min-width:0;}
.gm-name{font-family:ui-sans-serif,system-ui,sans-serif;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gold-soft);font-weight:700;margin-bottom:4px;}
.gm-line{font-size:1.02rem;line-height:1.42;color:var(--ash-light);font-style:italic;}

/* ---------- commission (fill-in-the-blank) ---------- */
:root{--commission-label:#8a6f4a;}
.commission{background:linear-gradient(180deg,#efe6d6,#e2d4bd);color:#33271a;border-radius:16px;
  padding:18px 18px 20px;box-shadow:0 14px 34px -18px #000,inset 0 0 0 1px #cbb896;position:relative;}
.commission .prompt-label{letter-spacing:.22em;margin-bottom:10px;}
.cloze{font-size:1.28rem;line-height:1.6;color:#2f2416;}
.slot{display:inline-block;min-width:88px;text-align:center;font-weight:700;color:#a8632a;
  padding:1px 10px 3px;margin:0 3px;border-bottom:2px dashed #c07a34;border-radius:5px;
  background:linear-gradient(180deg,rgba(255,140,66,.18),rgba(255,140,66,.05));
  box-shadow:0 0 14px rgba(255,120,40,.4);transition:.25s;}
.slot.slot-good{color:#2f7a44;border-bottom-color:#3f9a58;background:rgba(90,190,120,.18);box-shadow:0 0 16px rgba(90,200,120,.4);}
.slot.slot-bad{color:#a83a2a;border-bottom-color:#c05038;background:rgba(220,90,60,.16);}
.plate-static{cursor:default;justify-content:center;}
.plate-static .w{width:100%;text-align:center;}

/* ---------- living forge: ember field + sparks ---------- */
#embers-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
#app{position:relative;z-index:1;}
#embers-bg .eb{position:absolute;bottom:-8px;width:4px;height:4px;border-radius:50%;background:var(--gold);
  box-shadow:0 0 7px var(--ember);opacity:0;animation:ebrise linear infinite;}
@keyframes ebrise{0%{transform:translateY(0) scale(.5);opacity:0;}
  12%{opacity:calc(.35 + var(--restore)*.5);}100%{transform:translateY(-105vh) translateX(var(--dx)) scale(0);opacity:0;}}
.spark-burst{position:fixed;left:50%;top:38%;z-index:41;pointer-events:none;}
.spk{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--gold);
  box-shadow:0 0 8px var(--ember);animation:spk .6s ease-out forwards;}
@keyframes spk{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--sx),var(--sy)) scale(0);opacity:0;}}
.result-emblem{display:inline-block;animation:pulseGlow 2.4s ease-in-out infinite;}
.result-emblem .emblem{filter:drop-shadow(0 0 26px rgba(255,150,60,.75));}

/* ---------- leaderboard ---------- */
.lb-input{width:100%;font-family:ui-sans-serif,system-ui,sans-serif;font-size:1rem;font-weight:600;
  color:var(--parchment);background:var(--iron-2);border:none;border-radius:12px;padding:14px 16px;
  box-shadow:inset 0 0 0 1px var(--iron-3);outline:none;-webkit-appearance:none;}
.lb-input:focus{box-shadow:inset 0 0 0 1.5px var(--gold-soft);}
.lb-input::placeholder{color:var(--ash);font-weight:500;}
.lb-post{background:var(--iron-2);border-radius:16px;padding:16px;box-shadow:inset 0 0 0 1px var(--iron-3);margin-top:6px;}
.lb-post .k{font-family:ui-sans-serif,system-ui,sans-serif;font-size:.68rem;letter-spacing:.14em;
  text-transform:uppercase;color:var(--gold-soft);font-weight:700;margin-bottom:10px;}
.lb-row-form{display:flex;gap:9px;margin-top:10px;}
.lb-row-form .btn{width:auto;flex:0 0 auto;padding:14px 20px;}
.lb-filter{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.lb-filter::-webkit-scrollbar{display:none;}
.lb-chip{flex:0 0 auto;font-family:ui-sans-serif,system-ui,sans-serif;font-size:.82rem;font-weight:600;
  color:var(--ash);background:var(--iron-2);border-radius:20px;padding:8px 15px;box-shadow:inset 0 0 0 1px var(--iron-3);
  white-space:nowrap;transition:.15s;}
.lb-chip.on{color:#2a1206;background:linear-gradient(180deg,var(--gold),var(--gold-soft));box-shadow:none;}
.lb-list{display:flex;flex-direction:column;gap:7px;margin-top:6px;}
.lb-row{display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:12px;background:var(--iron-2);
  box-shadow:inset 0 0 0 1px var(--iron-3);}
.lb-row.me{box-shadow:inset 0 0 0 1.5px var(--gold-soft),0 0 18px -6px rgba(255,160,60,.5);
  background:linear-gradient(180deg,#2a2117,var(--iron-2));}
.lb-rank{flex:0 0 auto;width:30px;font-family:ui-sans-serif,system-ui,sans-serif;font-weight:800;font-size:1rem;
  color:var(--ash);text-align:center;}
.lb-row:nth-child(1) .lb-rank{color:var(--gold);}
.lb-name{flex:1;min-width:0;font-size:1.05rem;color:var(--parchment);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-world{font-family:ui-sans-serif,system-ui,sans-serif;font-size:.7rem;color:var(--ash);margin-top:2px;}
.lb-score{flex:0 0 auto;font-family:ui-sans-serif,system-ui,sans-serif;font-weight:800;font-size:1.05rem;color:var(--gold-soft);}
.lb-empty{text-align:center;color:var(--ash);font-family:ui-sans-serif,system-ui,sans-serif;font-size:.92rem;padding:34px 10px;}
.lb-medal{display:inline-block;width:30px;text-align:center;font-size:1.05rem;}
.map-link{display:block;width:100%;text-align:center;font-family:ui-sans-serif,system-ui,sans-serif;
  font-size:.9rem;font-weight:600;color:var(--gold-soft);padding:13px;margin-top:12px;border-radius:12px;
  background:var(--iron-2);box-shadow:inset 0 0 0 1px var(--iron-3);}

/* ---------- parchment atlas (2.5D parallax map) ---------- */
body.on-map{background:#efdfbe;overflow:hidden;}
body.on-map #embers-bg{display:none;}
body.on-map #app{padding:0;max-width:none;}
.atlas{position:relative;height:100dvh;overflow:hidden;touch-action:none;
  background:linear-gradient(180deg,#f6ecd4 0%,#f2e2bd 34%,#eeD9AC 55%,#e7cf9e 100%);
  user-select:none;-webkit-user-select:none;cursor:grab;}
.atlas.dragging{cursor:grabbing;}
.alayer{position:absolute;top:0;left:0;height:100%;will-change:transform;pointer-events:none;}
.alayer.ground{pointer-events:auto;}
.alayer svg{display:block;}
.a-sun{position:absolute;top:16%;left:230px;width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,#fff6dd 0%,#ffe9b0 45%,rgba(255,233,176,0) 70%);}
.a-cloud{position:absolute;border-radius:40px;background:rgba(255,252,242,.85);

/* ---- PRECISION ROUNDS: full per-word teaching for all four cards ---- */
const FORGE_PRECISION = [
  {
    situation:"Somehow, with almost no funding and no team, she put together a fully working budget.",
    tiers:{

const FORGE_IMPOSTOR = {

/* ---- SHARPEN ROUNDS (two-step: adequate → upgrade under new detail) ---- */
const FORGE_SHARPEN = [
  {
    step1:{
      situation:"The startup's 'organic' buzz looked staged — you could tell someone had worked to make it seem spontaneous.",
      ask:"What's happening here?",

/* ---- SIBLING DUEL: the two closest words, Contrive vs Confect ---- */
const FORGE_DUEL = {

  timePerRound:7000,
  rounds:[
    {situation:"The tell-all memoir's 'confessions' were crafted to rehabilitate his image before the trial.", answer:'confect'},

/* points */
const PTS = {exact:100, close:45, miss:15, impostor:100, sharpen1:40, sharpen2:60, duel:100, duelBonus:50};

/* ============================================================

   ============================================================ */
const GM_TABLE = {
  ruins:{name:'the Keeper of Ash', intro:"All things here come apart — but never the same way twice. Name the manner of ruin.", duel:"Quick now, before it all crumbles. Which decay is which?", win:"You read ruin like a map. Nothing here can fool you.", low:"You mistake rot for wear. Walk the ruins again."},
  court:{name:'Vesper, the Herald', intro:"Words wound differently at court. Choose the one that cuts as intended.", duel:"The court waits. Pick the sharper word, and be quick.", win:"A courtier's tongue. You wound with precision now.", low:"Your barbs land soft. Study the difference between insult and injury."},
  citadel:{name:'Bastion, the Warden', intro:"Some things cannot be moved, beaten, or broken — but along different lines. Find the axis.", duel:"Hold the wall. Which strength holds here?", win:"Unshaken. You know exactly what cannot be broken.", low:"You confuse the unmovable with the unbeatable. Return."},

  arena:{name:'Drin, the Marshal', intro:"Every word here moves someone to act — from a nudge to a mob. Match the force.", duel:"Rally fast. How great is the push?", win:"You measure every push exactly. To arms.", low:"You mistake a nudge for a march. Drill again."},
  orchard:{name:'the Orchardist', intro:"Hunger and things kept out of reach. Name the wanting rightly.", duel:"Before it slips away — which craving?", win:"You know appetite from the lure that feeds it. Ripe work.", low:"You confuse the hunger with the bait. Another season."},
  asylum:{name:'the Keeper', intro:"Altered states, rattled or unshaken. Name the daze with care.", duel:"Steady — which state is this?", win:"You read a mind's weather exactly. Composed.", low:"You blur the daze and the freeze. Return, calmly."},
  flatlands:{name:'the Grey Reeve', intro:"Reluctance, dullness, and nonsense. Flat country — but each flatness differs.", duel:"Plainly now — which dullness?", win:"You find the edges in flat country. Sharp.", low:"It all reads grey to you yet. Cross the flatlands again."},
  chapel:{name:'the Confessor', intro:"Belief, irritation, unease. Name the reaction, not the thing.", duel:"Softly, swiftly — which feeling?", win:"You name the tremor exactly. Faithful work.", low:"You mix the unsettling with the unjust. Sit a while."},
  counting_house:{name:'the Reckoner', intro:"Change, reckoning, deliberation. The balance shifts — or only seems to. Weigh it.", duel:"Tally quickly — real shift or false?", win:"Your ledger balances. You weigh meaning exactly.", low:"You confuse the true shift with the warped view. Recount."},
  archive:{name:'the Archivist', intro:"Knowledge, wit, and scale. Insider lore and slow minds. Shelve each word right.", duel:"Cite it fast — which term?", win:"You file every word in its place. Learned.", low:"Your shelves are muddled still. Read the stacks again."},

function slug(s){ return String(s).toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,''); }

function buildGenerated(wd){
  const words={};
  wd.words.forEach(w=>{ words[slug(w.word)]={label:w.word, def:w.definition, nuance:w.nuance_vs_synonym}; });
  const precision=[];
  wd.words.forEach(w=>{
    (w.scenarios||[]).forEach(sc=>{
      const ex=slug(sc.best_word), cl=slug(sc.plausible_distractor);
      if(!words[ex]) words[ex]={label:sc.best_word};
      if(!words[cl]) words[cl]={label:sc.plausible_distractor, external:true};
      const pool=Object.keys(words).filter(k=>!words[k].external && k!==ex && k!==cl);
      shuffle(pool);
      const fillers=pool.slice(0,2);
      const tiers={};
      tiers[ex]={t:'exact', x:`Precision Strike. <b>${words[ex].label}</b> — ${w.nuance_vs_synonym||w.definition}`};
      tiers[cl]={t:'close', x:sc.distractor_explanation};
      fillers.forEach(k=>{ tiers[k]={t:'miss', x:`<b>${words[k].label}</b>: ${(words[k].nuance||words[k].def||'a different sense entirely')} — it doesn't fit here.`}; });
      precision.push({situation:sc.situation, tiers});
    });
  });
  shuffle(precision);
  const rounds=precision.map(p=>{
    const ex=Object.keys(p.tiers).find(k=>p.tiers[k].t==='exact');
    const cl=Object.keys(p.tiers).find(k=>p.tiers[k].t==='close');
    return {situation:p.situation, answer:ex, options:[ex,cl]};
  });
  const gm=Object.assign({win:'',low:'',duel:''}, GM_TABLE[wd.id]||{name:'the Keeper'}, {glyph:GLYPHS[wd.id]||GLYPHS.forge});
  return {id:wd.id, name:wd.name, theme:wd.theme, words, precision,
    impostor:null, sharpen:[], duel:{timePerRound:8000, rounds}, gm,

function renderMap(){
  setMapMode(true);
  const done = ALL.filter(w=>save[w.id]&&save[w.id].restored).length;
  const vaultPct = Math.round(done/ALL.length*100);
  document.documentElement.style.setProperty('--restore', (0.12+0.88*done/ALL.length).toFixed(3));

  const GAP=205, X0=150, sceneW=X0+ALL.length*GAP+120;
  const bumps=[8,30,16,42,10,34,22,46,6,28,14,38,12,36,24,18];

  /* far ridge svg */
  let ridge='', gm2='';
  for(let x=0;x<sceneW;x+=150){
    const k=(x/150)%4;
    ridge+=`M${x} 400 L${x+80} ${60+k*24} L${x+170} ${205+(k%2)*28} L${x+260} 400 Z`;
  }
  for(let x=70;x<sceneW;x+=190){
    gm2+=`M${x} 400 Q${x+55} ${120+((x/190)%3)*30} ${x+110} 400 Z`;
  }

  const vignettes=ALL.map((w,i)=>{
    const rec=save[w.id]||{}; const x=X0+i*GAP; const lift=bumps[i%bumps.length];
    return `<div class="vignette ${rec.restored?'lit':''}" data-wid="${w.id}" style="left:${x}px;bottom:${150+lift}px">
      <svg class="vart" viewBox="0 0 120 96" width="150" height="120" aria-hidden="true">${VART[w.id]||VART.forge}</svg>
      <div class="vplaque">${rec.restored?'<span class="vstar">★</span> ':''}${escapeHtml(w.name)}</div>
    </div>`;
  }).join('');

  const clouds=Array.from({length:5},(_,i)=>{
    const w=60+Math.random()*70;
    return `<div class="a-cloud" style="left:${(6+i/5*88).toFixed(0)}%;top:${(10+Math.random()*15).toFixed(0)}%;
      width:${w.toFixed(0)}px;height:${(w*0.3).toFixed(0)}px;opacity:.4;animation-duration:${(40+Math.random()*40).toFixed(0)}s"></div>`;
  }).join('');

  app.innerHTML=`
  <div class="atlas" id="atlas">
    <div class="alayer sky" id="lySky" style="width:${sceneW}px">
      <div class="a-sun"></div>${clouds}
      <div class="a-bird" style="left:26%;top:20%">⌒⌒</div>
      <div class="a-bird" style="left:58%;top:14%;animation-delay:1.4s">⌒⌒</div>
    </div>
    <div class="alayer far" id="lyFar" style="width:${sceneW}px">
      <svg width="${sceneW}" viewBox="0 0 ${sceneW} 400" preserveAspectRatio="none"
        style="position:absolute;bottom:0;height:76%" aria-hidden="true">
        <path d="${ridge}" fill="#cdb389" opacity=".8"/>
        <path d="${gm2}" fill="#bfa578" opacity=".9"/>
      </svg>
    </div>
    <div class="alayer ground" id="lyGround" style="width:${sceneW}px">
      <svg width="${sceneW}" viewBox="0 0 ${sceneW} 300" preserveAspectRatio="none"
        style="position:absolute;bottom:0;height:48%" aria-hidden="true">
        <path d="M0 46 ${Array.from({length:Math.ceil(sceneW/300)},(_,i)=>`Q${i*300+150} ${16+(i%3)*24} ${(i+1)*300} 46`).join(' ')} L${sceneW} 300 L0 300 Z" fill="#d9be8a"/>
        <path d="M0 110 ${Array.from({length:Math.ceil(sceneW/260)},(_,i)=>`Q${i*260+130} ${80+(i%2)*26} ${(i+1)*260} 110`).join(' ')} L${sceneW} 300 L0 300 Z" fill="#cfae74"/>
      </svg>

    </div>

      <div class="eyebrow">The Word Vault</div>
      <div class="atlas-title" style="font-family:inherit">Word Worlds</div>
      <div class="atlas-sub">${ALL.length} realms of near-synonyms · restore each by telling its words apart</div>
      <div class="atlas-meter"><i style="width:${vaultPct}%"></i></div>
      <div class="atlas-sub" style="text-align:right;margin-top:4px">Vault restored — ${done}/${ALL.length}</div>
    </div>
    <div class="atlas-hint">← drag to travel the realms →</div>

      <button class="atlas-btn" onclick="renderLeaderboard('all')">🏆 The Ledger</button>

function initAtlasPan(sceneW){
  const atlas=document.getElementById('atlas');
  const sky=document.getElementById('lySky'), far=document.getElementById('lyFar'), gr=document.getElementById('lyGround');
  const vw=atlas.clientWidth;
  const minX=Math.min(0, vw-sceneW);
  let x = mapPan!==null ? Math.max(minX,Math.min(0,mapPan)) : 0;
  let vel=0, dragging=false, lastX=0, lastT=0, moved=0, raf=null;

  function apply(){
    mapPan=x;
    sky.style.transform=`translate3d(${x*0.15}px,0,0)`;
    far.style.transform=`translate3d(${x*0.45}px,0,0)`;
    gr.style.transform=`translate3d(${x}px,0,0)`;
  }
  function momentum(){
    if(dragging) return;
    vel*=0.94;
    if(Math.abs(vel)<0.15){ vel=0; return; }
    x=Math.max(minX,Math.min(0,x+vel));
    if(x===minX||x===0) vel=0;
    apply();
    raf=requestAnimationFrame(momentum);
  }
  atlas.addEventListener('pointerdown',e=>{
    dragging=true; moved=0; lastX=e.clientX; lastT=performance.now(); vel=0;
    cancelAnimationFrame(raf); atlas.classList.add('dragging');
    atlas.setPointerCapture(e.pointerId);
  });
  atlas.addEventListener('pointermove',e=>{
    if(!dragging) return;
    const dx=e.clientX-lastX; const now=performance.now();
    moved+=Math.abs(dx);
    x=Math.max(minX,Math.min(0,x+dx));
    vel=dx/Math.max(1,now-lastT)*16;
    lastX=e.clientX; lastT=now;
    apply();
  });
  function up(e){
    if(!dragging) return;
    dragging=false; atlas.classList.remove('dragging');
    if(Math.abs(vel)>0.5){ raf=requestAnimationFrame(momentum); }
  }
  atlas.addEventListener('pointerup',up);
  atlas.addEventListener('pointercancel',up);

  /* tap vignette (ignore if it was a drag) */
  atlas.querySelectorAll('.vignette').forEach(v=>{
    v.addEventListener('click',()=>{ if(moved<10) openSheet(v.dataset.wid); });
  });
  apply();
}

function answerPrecision(i,pick,el){
  const r=PRECISION[i];
  const res=r.tiers[pick];
  const t=res.t;
  state.totalAnswers++;
  haptic();

  if(r.cloze){
    const slot=document.getElementById('slot');
    if(slot){
      const ex=Object.keys(r.tiers).find(k=>r.tiers[k].t==='exact');
      slot.textContent=WORDS[ex].label.toLowerCase();
      slot.classList.add(pick===ex?'slot-good':'slot-bad');
    }
  }

  // lock cards, style them
  document.querySelectorAll('#cards .wordcard').forEach(c=>{
    c.onclick=null; c.style.cursor='default';
    const w=c.dataset.w;
    if(w===pick) c.classList.add('pick-'+t);
    else if(r.tiers[w].t==='exact') c.classList.add('reveal-exact');
    else c.classList.add('dim');
    if(r.tiers[w].t==='exact'){ c.insertAdjacentHTML('beforeend','<span class="tick" style="color:var(--good)">✓ exact</span>'); }
  });

  let pts = PTS[t];
  addScore(pts);
  if(t==='exact'){ state.precisionStrikes++; state.correctFirst++; strikeFX(); toast('⚡ Precision Strike!'); }

  const badgeTxt = t==='exact'?'Precision Strike':(t==='close'?'Close — but not sharp':'Off the mark');
  const exactKey = Object.keys(r.tiers).find(k=>r.tiers[k].t==='exact');

  let html=`<div class="feedback">
    <div class="verdict">
      <span class="badge ${t}">${badgeTxt}</span>
      <span class="pts">+${pts}</span>
    </div>
    <div class="explain"><span class="lead">${WORDS[pick].label}</span>${res.x}</div>`;
  if(t!=='exact'){
    html+=`<div class="explain"><span class="lead">The precise word · ${WORDS[exactKey].label}</span>${r.tiers[exactKey].x}</div>`;
  }
  html+=`<div class="spacer"></div>
    <button class="btn" onclick="renderPrecision(${i+1})">${i+1>=PRECISION.length?'Next Trial ›':'Continue'}</button>
    </div>`;
  document.getElementById('fb').innerHTML=html;
  updateHeaderScore();
}

let duelTimer=null, duelStart=0, duelDur=0;
function startDuel(){ state.duelStreak=0; renderDuelRound(0); }

function renderDuelRound(i){
  clearInterval(duelTimer);
  if(i>=DUEL.rounds.length){ return finishRun(); }
  const r=DUEL.rounds[i];
  const cards=shuffle((r.options||[DUEL.a,DUEL.b]).slice());
  app.innerHTML=`
  <div class="screen">
    ${runHeader('Boss · '+(i+1)+'/'+DUEL.rounds.length)}
    <div class="round">
      <div class="combo" id="combo">${state.duelStreak>1?state.duelStreak+' in a row · combo':''}</div>

      <div class="situation-card">
        <div class="prompt-label">Place the word</div>
        <div class="situation-text">${r.situation}</div>
      </div>
      <div class="duel-cards" id="cards" style="margin-top:18px">
        ${cards.map(k=>`<button class="wordcard" data-w="${k}" onclick="answerDuel(${i},'${k}')">
          <span class="w">${WORDS[k].label}</span></button>`).join('')}
      </div>
      <div id="fb"></div>
    </div>
  </div>`;

  // timer
  duelStart=Date.now(); duelDur=DUEL.timePerRound;
  const tEl=document.getElementById('timer');
  duelTimer=setInterval(()=>{
    const left=Math.max(0,1-(Date.now()-duelStart)/duelDur);
    tEl.style.width=(left*100)+'%';
    if(left<0.33) tEl.classList.add('low');
    if(left<=0){ clearInterval(duelTimer); answerDuel(i,null,true); }
  },80);
}
function answerDuel(i,pick,timeout){
  clearInterval(duelTimer);
  const r=DUEL.rounds[i];
  const remaining = Math.max(0, 1-(Date.now()-duelStart)/duelDur);
  const correct = pick===r.answer;
  state.totalAnswers++;
  if(!timeout) haptic();

  document.querySelectorAll('#cards .wordcard').forEach(c=>{
    c.onclick=null;c.style.cursor='default';const w=c.dataset.w;
    if(w===r.answer) c.classList.add(correct?'pick-exact':'reveal-exact');
    else if(w===pick) c.classList.add('pick-miss');
    else c.classList.add('dim');
  });

  let pts=0, bonus=0;
  if(correct){
    bonus=Math.round(PTS.duelBonus*remaining);
    pts=PTS.duel+bonus;
    state.duelStreak++; state.bestDuelStreak=Math.max(state.bestDuelStreak,state.duelStreak);
    state.correctFirst++;
    if(state.duelStreak>=3) strikeFX();
    toast(`+${pts}${state.duelStreak>=2?' · '+state.duelStreak+' streak':''}`);
  } else {
    state.duelStreak=0;
  }
  addScore(pts);
  updateHeaderScore();

  document.getElementById('fb').innerHTML=`
    <div class="feedback">
      <div class="verdict">
        <span class="badge ${correct?'exact':'miss'}">${timeout?'Too slow':(correct?'Correct':'Wrong sibling')}</span>
        <span class="pts">+${pts}${bonus?` <small style="color:var(--ash);font-weight:600">(${bonus} speed)</small>`:''}</span>
      </div>
      <div class="explain">The answer was <b>${WORDS[r.answer].label}</b>.</div>
      <div class="spacer"></div>
      <button class="btn" onclick="renderDuelRound(${i+1})">${i+1>=DUEL.rounds.length?'Finish the Forge ›':'Next ›'}</button>
    </div>`;
}

      <button class="btn" onclick="startRun(W.id)">Play Again</button>
      <button class="btn ghost" onclick="renderLeaderboard('${W.id}')">Leaderboard</button>
      <button class="btn ghost" onclick="renderMap()">Return to Map</button>
    </div>
    <div class="footer-note">15 more worlds wait in the vault.</div>
  </div>`;
  if(restored){ strikeFX(); setTimeout(()=>toast(W.name+' restored!'),300); }
}

/* ---------- helpers ---------- */
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function updateHeaderScore(){
  const chip=document.querySelector('.score-chip'); if(chip) chip.innerHTML=state.score+'<small> pts</small>';
  const p=Math.round(pct()*100);
  const fill=document.querySelector('.restore-fill'); if(fill) fill.style.width=p+'%';
  const lab=document.querySelector('.restore-label'); if(lab) lab.textContent=(W?W.name:'World')+' restored — '+p+'%';
}

/* boot */
spawnEmbers();
renderMap();
</script>
</body>
</html>
